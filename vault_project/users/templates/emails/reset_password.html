<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>

<body style="font-family: Arial; background:#f5f5f5; padding:40px;">

  <div style="
    max-width:500px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:16px;
  ">

    <h2>Reset Your Password</h2>

    <p>Hello {{ username }},</p>

    <p>
      Click the button below to reset your password.
    </p>

    <a
      href="{{ reset_url }}"
      style="
        display:inline-block;
        background:#4f46e5;
        color:white;
        padding:12px 24px;
        border-radius:10px;
        text-decoration:none;
        margin-top:20px;
      "
    >
      Reset Password
    </a>

    <p style="margin-top:30px;color:gray;">
      If you didn’t request this,
      you can ignore this email.
    </p>

  </div>

</body>
</html>
